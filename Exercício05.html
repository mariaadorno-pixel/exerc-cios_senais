<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugestões</title>
</head>
<body>
    <div>
        <header>
            <h2>CyberExpress</h2>
        </header>
        <main>
            <h1>Caixa de Sugestões</h1>
            <p>Escreva na caixa de texto abaixo o que podemos fazer para melhorar o espaco do CyberExpress. Deixe seu elogio, critica ou sugestao abaixo e envie pra gente!</p>
            <form method="post" action="#">
                <textarea name="Sugestão" style="resize: none;" required="yes" rows="7" cols="50"></textarea>
                <br>
                <button type="submit">Enviar Sugestão</button>
            </form>
        </main>
        <br>
        <footer>
            Copyright 2023- CyberExpress
        </footer>
    </div>
</body>
</html>
